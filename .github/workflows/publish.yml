name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    if: github.repository == 'open-reaction-database/ord-schema'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC.
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PUSH }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages
          registry-url: 'https://registry.npmjs.org'
      - name: Bump patch version
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          uv pip install bump2version
          bump2version patch --verbose
      - name: Build and upload to PyPI
        env:
          TWINE_USERNAME: '__token__'
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv pip install build twine wheel
          python -m build
          python -m twine check dist/*
          python -m twine upload dist/*
      - name: Build and upload to NPM
        run: |
          cd js/ord-schema
          npm install
          npm run build
          npm publish
      - name: Build and upload to NPM (protobufjs)
        run: |
          cd js/ord-schema-protobufjs
          npm install
          npm run build
          npm publish
      - name: Push version bump and tags
        run: git push origin main --tags
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # https://gist.github.com/rponte/fdc0724dd984088606b0?permalink_comment_id=3064455#gistcomment-3064455
          TAG="$(git tag --sort=-v:refname | head -n 1)"
          gh release create "${TAG}" --generate-notes
