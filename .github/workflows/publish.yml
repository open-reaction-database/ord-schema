name: Publish

on:
  push:
    branches:
      - main

jobs:
  # PyPA recommends splitting build (low privilege) from publish (OIDC). We keep one job because
  # bump2version commits locally and we only push to main after PyPI + npm succeed; a second job
  # cannot check out that unpublished commit without pushing first or shipping a full repo artifact.
  publish:
    if: github.repository == 'open-reaction-database/ord-schema'
    runs-on: ubuntu-latest
    # Optional on PyPI: if the trusted publisher names a GitHub environment, add matching:
    #   environment:
    #     name: pypi
    #     url: https://pypi.org/project/ord-schema/
    permissions:
      contents: write
      id-token: write  # PyPI + npm trusted publishing (OIDC).
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PUSH }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14 and npm >= 11.5.1 (https://docs.npmjs.com/trusted-publishers)
          node-version: '24'
          # https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages
          registry-url: 'https://registry.npmjs.org'
      - name: Determine bump level
        id: bump
        run: |
          # Default to patch. A `[bump minor]` or `[bump major]` tag in the PR
          # title (case-insensitive) opts into a larger release. The PR title
          # lives in the subject line of the squash-merge commit that lands on
          # main — we only scan that subject, not the body, so the tag has to
          # be visible on the PR page itself.
          # `[bump major]` wins over `[bump minor]`.
          subject="$(git log -1 --format=%s)"
          if printf '%s' "$subject" | grep -qiE '\[bump[[:space:]]+major\]'; then
            level=major
          elif printf '%s' "$subject" | grep -qiE '\[bump[[:space:]]+minor\]'; then
            level=minor
          else
            level=patch
          fi
          # Warn on `[bump WORD]` where WORD isn't a valid level (typo guard).
          unrecognized="$(printf '%s' "$subject" | grep -oiE '\[bump[[:space:]]+[a-zA-Z]+\]' | grep -viE '\[bump[[:space:]]+(major|minor|patch)\]' || true)"
          if [ -n "$unrecognized" ]; then
            echo "::warning::Unrecognized bump tag(s) in PR title; using level='$level'. Valid: [bump major|minor|patch]. Found: $(printf '%s' "$unrecognized" | tr '\n' ' ')"
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Bump level: $level"
      - name: Bump version
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          uv pip install bump2version
          bump2version "${{ steps.bump.outputs.level }}" --verbose
      # PyPI Trusted Publishing (OIDC); configure at https://docs.pypi.org/trusted-publishers/
      # for this repo + workflow file publish.yml (no PYPI_API_TOKEN / legacy upload).
      - name: Build Python distributions
        run: |
          uv pip install build twine wheel
          python -m build
          python -m twine check dist/*
      # Use release/v1 (not a bare v1.x.x tag): each tag must have a matching GHCR image
      # (ghcr.io/pypa/gh-action-pypi-publish:<ref>); v1.14.0 had no manifest at publish time.
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verify-metadata: false
      - name: Build and upload to NPM
        run: |
          cd js/ord-schema
          npm install
          npm run build
          npm publish
      - name: Build and upload to NPM (protobufjs)
        run: |
          cd js/ord-schema-protobufjs
          npm install
          npm run build
          npm publish
      - name: Push version bump and tags
        run: git push origin main --tags
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # https://gist.github.com/rponte/fdc0724dd984088606b0?permalink_comment_id=3064455#gistcomment-3064455
          TAG="$(git tag --sort=-v:refname | head -n 1)"
          gh release create "${TAG}" --generate-notes
