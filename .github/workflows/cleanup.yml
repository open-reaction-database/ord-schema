name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check_licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.16'
      - name: Install dependencies
        run: |
          go install github.com/google/addlicense@v1.2.0
      - name: addlicense
        run: |
          "${HOME}/go/bin/addlicense" -check -c "Open Reaction Database Project Authors" -l apache .

  check_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.10'
      - name: Install ord-schema
        run: uv sync --extra examples --extra tests --locked
      - name: Verify bump2version config (dry-run)
        run: |
          uv pip install bump2version
          bump2version patch --dry-run --verbose
      - name: Run ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      # ty: ord_schema only. Under examples/ we ship notebooks (no .py); those are exercised in
      # test_notebooks (treon), not static type-checking here.
      - name: Run ty
        run: |
          uv run ty check ord_schema

  check_proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: |
          sudo apt update && sudo apt install clang-format --yes
          find . -name '*.proto' -exec clang-format -n -Werror --style=file {} +
