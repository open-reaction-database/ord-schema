name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test_ord_schema:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-14"]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      PGDATA: $GITHUB_WORKSPACE/rdkit-postgres
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: 'latest'
      - name: Setup PostgreSQL
        shell: bash -l {0}
        run: |
          # NOTE(skearnes): conda is only used for postgres (not python).
          conda install -c conda-forge rdkit-postgresql
          initdb
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install ord_schema
        run: uv sync --extra tests --locked
      - name: Run tests
        shell: bash -l {0}
        run: |
          uv run coverage erase
          uv run pytest -vv --cov=ord_schema --durations=20
          uv run coverage xml
      # Codecov uses CODECOV_TOKEN when set. Do not fail the job when uploads cannot authenticate:
      # fork PRs (tokenless), Dependabot PRs (no repo secrets + protected dependabot/* branches).
      # Pushes to main and normal same-repo PRs stay strict.
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && !startsWith(github.head_ref, 'dependabot/')) }}
          token: ${{ secrets.CODECOV_TOKEN }}

  test_notebooks:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-14"]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      # CPU-only runners: avoid TensorFlow probing CUDA (noise + unstable kernels).
      CUDA_VISIBLE_DEVICES: "-1"
      TF_CPP_MIN_LOG_LEVEL: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install ord_schema
        run: uv sync --extra examples --extra tests --locked
      - name: Test notebooks
        # Single-threaded: default treon parallelism loads TensorFlow in multiple kernels and OOMs on CI.
        run: uv run treon --threads=1

  test_proto_wrappers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install protoc
        run: |
          mkdir protoc
          cd protoc
          wget https://github.com/protocolbuffers/protobuf/releases/download/v22.3/protoc-22.3-linux-x86_64.zip
          echo "0f8070d762eb8a2f5a13a47713a553f989f9d9b556e7e3ebfa2bd6464e2ecaeb  protoc-22.3-linux-x86_64.zip" | sha256sum -c -
          unzip protoc-22.3-linux-x86_64.zip
          wget https://github.com/protocolbuffers/protobuf-javascript/releases/download/v3.21.2/protobuf-javascript-3.21.2-linux-x86_64.zip
          echo "075ed6163fea314c415f67a4af68d1b6dbddc8fa8be35addf74e4c81812a9148  protobuf-javascript-3.21.2-linux-x86_64.zip" | sha256sum -c -
          unzip protobuf-javascript-3.21.2-linux-x86_64.zip
          npm i -g ts-protoc-gen@0.15.0 protobufjs@7.4.0 protobufjs-cli@1.1.3
          PATH=$GITHUB_WORKSPACE/protoc/bin:$PATH protoc --version
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.16'
      - name: Install addlicense
        run: go install github.com/google/addlicense@latest
      - name: Run protoc
        run: |
          PATH=$GITHUB_WORKSPACE/protoc/bin:$PATH ./compile_proto_wrappers.sh
          "${HOME}/go/bin/addlicense" -c "Open Reaction Database Project Authors" -l apache .
      - name: Check for drift
        run: |
          # Ignore the copyright line in the diff so the year can change.
          [[ -z $(git diff -I "^(#| \*) Copyright") ]] || { echo "proto wrappers do not match:\n$(git diff)"; exit 1; }

  test_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Test NPM package
        run: |
          cd js/ord-schema
          npm install-test

  test_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14 and npm >= 11.5.1 (https://docs.npmjs.com/trusted-publishers)
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify bump2version config (dry-run)
        run: |
          uv pip install bump2version
          bump2version patch --dry-run --verbose
      - name: Test python
        run: |
          # Same pre-upload steps as publish.yml; PyPI upload runs only on main with secrets.
          uv pip install build twine wheel
          python -m build
          python -m twine check dist/*
      - name: Test javascript
        run: |
          cd js/ord-schema
          npm install
          npm run build
          npm publish --dry-run
      - name: Test javascript (protobufjs)
        run: |
          cd js/ord-schema-protobufjs
          npm install
          npm run build
          npm publish --dry-run
