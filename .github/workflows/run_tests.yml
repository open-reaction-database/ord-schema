name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test_ord_schema:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-14"]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      PGDATA: $GITHUB_WORKSPACE/rdkit-postgres
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: 'latest'
      - name: Setup PostgreSQL
        shell: bash -l {0}
        run: |
          # NOTE(skearnes): conda is only used for postgres (not python).
          conda install -c conda-forge rdkit-postgresql
          initdb
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install ord_schema
        run: uv sync --extra tests --locked
      - name: Run tests
        shell: bash -l {0}
        run: |
          uv run coverage erase
          uv run pytest -vv --cov=ord_schema --durations=20
          uv run coverage xml
      # Codecov v4+ requires a token for branch pushes; add CODECOV_TOKEN in repo secrets.
      # Fork PRs to public repos often upload without it (tokenless).
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test_notebooks:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-14"]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install ord_schema
        run: uv sync --extra examples --extra tests --locked
      - name: Test notebooks
        run: uv run treon

  test_proto_wrappers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install protoc
        run: |
          mkdir protoc
          cd protoc
          wget https://github.com/protocolbuffers/protobuf/releases/download/v22.3/protoc-22.3-linux-x86_64.zip
          unzip protoc-22.3-linux-x86_64.zip
          wget https://github.com/protocolbuffers/protobuf-javascript/releases/download/v3.21.2/protobuf-javascript-3.21.2-linux-x86_64.zip
          unzip protobuf-javascript-3.21.2-linux-x86_64.zip
          npm i -g ts-protoc-gen@0.15.0 protobufjs@7.4.0 protobufjs-cli@1.1.3
          PATH=$GITHUB_WORKSPACE/protoc/bin:$PATH protoc --version
      - name: Run protoc
        run: |
          PATH=$GITHUB_WORKSPACE/protoc/bin:$PATH ./compile_proto_wrappers.sh
          ./format.sh  # Add license headers.
      - name: Check for drift
        run: |
          # Ignore the copyright line in the diff so the year can change.
          [[ -z $(git diff -I "^(#| \*) Copyright") ]] || { echo "proto wrappers do not match:\n$(git diff)"; exit 1; }

  test_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test NPM package
        run: |
          cd js/ord-schema
          npm install-test

  test_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify bump2version config (dry-run)
        run: |
          uv pip install bump2version
          bump2version patch --dry-run --verbose
      - name: Test python
        run: |
          uv pip install build twine wheel
          python -m build
      - name: Test javascript
        run: |
          cd js/ord-schema
          npm install
          npm run build
          npm publish --dry-run
